<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<title>Multiplayer Pong</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
touch-action:none;
-webkit-user-select:none;
user-select:none;
}

body{
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

#container{
width:100vw;
height:100vh;
position:relative;
}

canvas{
width:100%;
height:100%;
display:block;
background:#000;
}

#overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

background:rgba(0,0,0,.6);

font-size:28px;
font-weight:bold;
padding:20px;

z-index:10;
}

#score{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);

font-size:36px;
font-weight:bold;

z-index:5;
}

#info{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);

font-size:14px;
opacity:.7;

z-index:5;
}
</style>
</head>

<body>

<div id="container">

<div id="score">
0 - 0
</div>

<div id="overlay">
Connecting...
</div>

<div id="info">
Touch & Drag
</div>

<canvas id="game"></canvas>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io(window.location.origin);

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const overlay = document.getElementById("overlay");
const scoreEl = document.getElementById("score");

canvas.width = 400;
canvas.height = 700;

let state = null;

const GAME_WIDTH = 400;
const GAME_HEIGHT = 700;

const PADDLE_WIDTH = 100;
const PADDLE_HEIGHT = 18;
const BALL_SIZE = 14;

function resizeCanvas(){
canvas.style.width = window.innerWidth + "px";
canvas.style.height = window.innerHeight + "px";
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

socket.emit("join_game");

socket.on("waiting", data=>{
overlay.style.display="flex";
overlay.innerHTML=data.message || "Waiting...";
});

socket.on("game_start", ()=>{
overlay.style.display="none";
});

socket.on("player_disconnected", ()=>{
overlay.style.display="flex";
overlay.innerHTML="Player Disconnected";
});

socket.on("game_over", data=>{
overlay.style.display="flex";
overlay.innerHTML=
"Player " +
data.winner +
" Wins<br><br>Refresh to play again";
});

socket.on("game_state", gameState=>{
state=gameState;

scoreEl.textContent=
gameState.score.player1 +
" - " +
gameState.score.player2;
});

function sendPaddlePosition(clientX){

const rect = canvas.getBoundingClientRect();

const x =
((clientX - rect.left) / rect.width)
* GAME_WIDTH;

socket.emit(
"paddle_move",
x - PADDLE_WIDTH/2
);
}

canvas.addEventListener("touchstart", e=>{
sendPaddlePosition(
e.touches[0].clientX
);
});

canvas.addEventListener("touchmove", e=>{
sendPaddlePosition(
e.touches[0].clientX
);
});

canvas.addEventListener("mousedown", e=>{
sendPaddlePosition(
e.clientX
);
});

canvas.addEventListener("mousemove", e=>{
if(e.buttons){
sendPaddlePosition(
e.clientX
);
}
});

function drawCenterLine(){

ctx.strokeStyle="#333";
ctx.lineWidth=3;

ctx.beginPath();

ctx.setLineDash([10,10]);

ctx.moveTo(
GAME_WIDTH/2,
0
);

ctx.lineTo(
GAME_WIDTH/2,
GAME_HEIGHT
);

ctx.stroke();

ctx.setLineDash([]);
}

function render(){

ctx.clearRect(
0,
0,
GAME_WIDTH,
GAME_HEIGHT
);

drawCenterLine();

if(state){

ctx.fillStyle="#fff";

ctx.fillRect(
state.paddles.player2,
20,
PADDLE_WIDTH,
PADDLE_HEIGHT
);

ctx.fillRect(
state.paddles.player1,
GAME_HEIGHT-40,
PADDLE_WIDTH,
PADDLE_HEIGHT
);

ctx.beginPath();

ctx.arc(
state.ball.x,
state.ball.y,
BALL_SIZE/2,
0,
Math.PI*2
);

ctx.fill();
}

requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
